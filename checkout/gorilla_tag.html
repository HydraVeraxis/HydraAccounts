<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydra Accounts | Checkout</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- FIX: defer so DOM loads first -->
<script src="script.js" defer></script>
</head>

<body>

<header>
    <div class="logo">HYDRA</div>
    <a onclick="location.href='../purchase/purchase_gorilla_tag.html'">← Back</a>
</header>

<section class="checkout">

    <div class="form">

        <h1>Secure Checkout</h1>
        <p class="subtitle">Card payments only. Fast & encrypted.</p>

        <div class="card-box">

            <label>Card Number</label>
            <input id="cardNumber" type="text" placeholder="1234 5678 9012 3456" maxlength="19">

            <div class="row">
                <div>
                    <label>Expiry</label>
                    <input id="expiry" type="text" placeholder="MM/YY" maxlength="5">
                </div>

                <div>
                    <label>CVC</label>
                    <input id="cvc" type="text" placeholder="123" maxlength="4">
                </div>
            </div>

            <label>Name on Card</label>
            <input id="cardName" type="text" placeholder="John Doe">

            <label>Email</label>
            <input id="email" type="email" placeholder="you@example.com">

        </div>

        <button class="pay-btn" id="payBtn" onclick='checkout()' disabled>Pay Now</button>

        <p class="secure">🔒 Secure SSL Encrypted Payment</p>

    </div>

    <div class="summary">
        <h2>Order Summary</h2>

        <div class="item">
            <img src="../gorilla-tag-product-img.png">
            <div>
                <h4>Gorilla Tag Account</h4>
                <p></p>
                <span>$5.81</span>
            </div>
        </div>

        <hr>

        <div class="line">
            <span>Subtotal</span>
            <span>$5.81</span>
        </div>

        <div class="line">
            <span>Tax</span>
            <span>$0.29</span>
        </div>

        <div class="line total">
            <span>Total</span>
            <span>$6.10</span>
        </div>

    </div>

</section>

</body>
</html>
